server:
  port: 8080

spring:
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    protocol: ${MAIL_PROTOCOL:smtp}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000
          starttls:
            enable: ${MAIL_STARTTLS_ENABLE:false}
            required: ${MAIL_STARTTLS_REQUIRED:false}
          ssl:
            enable: ${MAIL_SSL_ENABLE:true}
  application:
    name: ich-promotion-system
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/ich_promotion_db?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&useSSL=false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:12345678}
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  redis:
    enabled: true
    host: 127.0.0.1
    port: 6379
    database: 0
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0
    connect-timeout: 5000
    timeout: 5000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath*:/mapper/**/*.xml

deepseek:
  api:
    key: ${DEEPSEEK_API_KEY:change-me}

jwt:
  secret: ${JWT_SECRET:ichPromotionSystemSecretKey202603021530NonHeritage}
  expiration: 86400000
