  <path d="M0 720 C220 640 360 660 540 720 S920 840 1180 730 S1440 620 1600 690 L1600 900 L0 900 Z" fill="#8f4f38" fill-opacity="0.16" />
  <rect x="164" y="146" width="1272" height="608" rx="36" fill="url(#card)" stroke="#a46f46" stroke-opacity="0.28" />
  <g fill="none" stroke="#a46f46" stroke-linecap="round">
    <path d="M284 286 C398 196 510 196 624 286" stroke-width="18" stroke-opacity="0.34" />
    <path d="M976 268 C1084 208 1188 208 1296 268" stroke-width="16" stroke-opacity="0.22" />
