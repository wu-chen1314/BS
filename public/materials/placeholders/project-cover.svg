<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">ICH project placeholder cover</title>
  <desc id="desc">Local fallback cover for heritage project cards and detail views.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#f8efe2" />
      <stop offset="55%" stop-color="#f3ddbf" />
      <stop offset="100%" stop-color="#d8b27f" />
    </linearGradient>
    <linearGradient id="card" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#fffaf2" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#f4e1c6" stop-opacity="0.9" />
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)" rx="48" />
  <circle cx="1320" cy="180" r="140" fill="#ffffff" fill-opacity="0.16" />
