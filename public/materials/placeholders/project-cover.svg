    <circle cx="430" cy="418" r="22" fill-opacity="0.2" />
    <circle cx="502" cy="418" r="22" fill-opacity="0.12" />
  </g>
  <text x="800" y="408" text-anchor="middle" font-family="Georgia, serif" font-size="88" fill="#5d3224" letter-spacing="8">ICH ARCHIVE</text>
  <text x="800" y="494" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" fill="#7d5641" letter-spacing="4">LOCAL MATERIAL PLACEHOLDER</text>
